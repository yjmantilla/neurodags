          operation: 'std'

  # ---------------------------------------------------------------------------
  # Stage 8 – Number of zero crossings (normalized)
  # ---------------------------------------------------------------------------

  AntropyNumZeroCross:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AmpNorm.fif
      - id: 1
        node: antropy_num_zerocross
        args:
          data_like: id.0
          dim: 'times'
          normalize: True

  NumZeroCrossMean:
