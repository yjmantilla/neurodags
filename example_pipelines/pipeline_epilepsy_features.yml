          dim: hjorthComponents
          start: complexity
          end: complexity
      - id: 2
        node: aggregate_across_dimension
        args:
          xarray_data: id.1
          dim: 'epochs'
          operation: 'mean'

  HjorthComplexitySD:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropyHjorthParams.nc
      - id: 1
        node: slice_xarray
        args:
          xarray_data: id.0
          dim: hjorthComponents
          start: complexity
          end: complexity
      - id: 2
        node: aggregate_across_dimension
        args:
          xarray_data: id.1
