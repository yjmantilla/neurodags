  # ---------------------------------------------------------------------------

  AntropyHiguchiFD:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AmpNorm.fif
      - id: 1
        node: antropy_higuchi_fd
        args:
          data_like: id.0
          dim: 'times'
          kmax: 10

  HiguchiFDMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropyHiguchiFD.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: 'epochs'
          operation: 'mean'

  HiguchiFDSD:
