      - id: 0
        derivative: AmpNorm.fif
      - id: 1
        node: antropy_perm_entropy
        args:
          data_like: id.0
          dim: 'times'
          order: 3
          delay: 1
          normalize: True

  PermEntropyMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropyPermEntropy.nc
      - id: 1
        node: aggregate_across_dimension
        args:
