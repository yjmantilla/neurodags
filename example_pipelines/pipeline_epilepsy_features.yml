        args:
          xarray_data: id.0
          dim: 'epochs'
          operation: 'std'

  # ---------------------------------------------------------------------------
  # Stage 14 – Multiscale entropy (neurokit2)
  #
  # Original params: scale='default', dimension=3, tolerance='sd' (now r='sd'),
  # method='MSEn' (now default).  figure_encoding='none' skips matplotlib output.
  # ---------------------------------------------------------------------------

  NeurokitEntropyMultiscale:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AmpNorm.fif
      - id: 1
        node: neurokit_entropy_multiscale
        args:
          data_like: id.0
          dim: 'times'
          figure_encoding: 'none'
          scale: 'default'
          dimension: 3
          r: 'sd'

  EntropyMultiscaleMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: NeurokitEntropyMultiscale.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: 'value'
      - id: 2
        node: aggregate_across_dimension
        args:
          xarray_data: id.1
          dim: 'epochs'
          operation: 'mean'

  EntropyMultiscaleSD:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: NeurokitEntropyMultiscale.nc
      - id: 1
