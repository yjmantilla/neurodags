  AppEntropySD:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropyAppEntropy.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: 'epochs'
          operation: 'std'

  # ---------------------------------------------------------------------------
  # Stage 7 – Hjorth parameters (mobility and complexity)
  # ---------------------------------------------------------------------------

  AntropyHjorthParams:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AmpNorm.fif
      - id: 1
        node: antropy_hjorth_params
        args:
          data_like: id.0
          dim: 'times'

  HjorthMobilityMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropyHjorthParams.nc
      - id: 1
        node: slice_xarray
        args:
          xarray_data: id.0
          dim: hjorthComponents
          start: mobility
          end: mobility
      - id: 2
        node: aggregate_across_dimension
        args:
          xarray_data: id.1
          dim: 'epochs'
          operation: 'mean'

  HjorthMobilitySD:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropyHjorthParams.nc
      - id: 1
        node: slice_xarray
        args:
          xarray_data: id.0
          dim: hjorthComponents
          start: mobility
          end: mobility
      - id: 2
