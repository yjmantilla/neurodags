          operation: 'mean'

  PermEntropySD:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropyPermEntropy.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: 'epochs'
          operation: 'std'

  # ---------------------------------------------------------------------------
  # Stage 10 – SVD entropy
  # ---------------------------------------------------------------------------

  AntropySVDEntropy:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AmpNorm.fif
      - id: 1
        node: antropy_svd_entropy
        args:
          data_like: id.0
          dim: 'times'
          order: 3
          delay: 1
          normalize: True

  SVDEntropyMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropySVDEntropy.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: 'epochs'
          operation: 'mean'

  SVDEntropySD:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AntropySVDEntropy.nc
      - id: 1
        node: aggregate_across_dimension
        args:
