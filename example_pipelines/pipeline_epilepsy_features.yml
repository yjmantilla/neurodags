        args:
          dataset_like: id.0
          data_var: 'value'
      - id: 2
        node: aggregate_across_dimension
        args:
          xarray_data: id.1
          dim: 'epochs'
          operation: 'std'

DerivativeList:
  # Preprocessing (required by all features)
  - Mat2fif
  - BasicPrep
  - AmpNorm

  # 1/f slope via FOOOF
  - SpectrumWelch5to100
  - FooofWelch5to100
  - apSlope5to100trMean
  - apSlope5to100trSD

  # Lempel-Ziv complexity
  - AntropyLZivComplexity
  - LZivComplexityMean
  - LZivComplexitySD

  # Sample entropy
  - AntropySampleEntropy
  - SampleEntropyMean
  - SampleEntropySD

  # Spectral entropy (TR)
