  AntropyPetrosianFD:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AmpNorm.fif
      - id: 1
        node: antropy_petrosian_fd
        args:
          data_like: id.0
          dim: 'times'

  PetrosianFDMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
