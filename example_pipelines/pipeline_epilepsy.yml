datasets: example_pipelines/datasets_epilepsy.yml
mount_point: local
new_definitions: example_pipelines/definitions_epilepsy.py

FeatureDefinitions:
  Mat2fif:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        feature: SourceFile
      - id: 1
        node: mat2fif
        args:
          eegpath: id.0

  BasicPrep:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        feature: Mat2fif.fif
      - id: 1
        node: basic_preprocessing
        args:
          mne_object: id.0
          resample: 256
          notch_filter: null
          filter_args:
            l_freq: 0.5
            h_freq: 110
          epoch_config:
            duration: 1
            overlap: 0.5
            reject_by_annotation : False
            proj : False
          extra_artifacts: True
  AmpNorm:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        feature: BasicPrep.fif
      - id: 1
        node: amplitude_normalization_per_segment
        args:
          mne_object: id.0

  SpectrumArrayMultitaper:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        feature: AmpNorm.fif
      - id: 1
        node: mne_spectrum_array
        args:
          meeg: id.0
          method: 'multitaper'
          method_kwargs:
            bandwidth : null
            adaptive: False
            low_bias: True
            normalization: 'length'
            remove_dc: True
            output: 'power'


  FooofArray:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        feature: SpectrumArrayMultitaper.nc
      - id: 1
        node: fooof
        args:
          psd_like: id.0
          freq_dim: 'frequencies'
          fooof_options:
            FOOOF:
              aperiodic_mode: 'knee'
            fit:
              freq_range: [1, 90]
            freq_res: 1
            save:
              save_results: True
              save_settings: True
              save_data: True
          include_timings: True

  apSlopeMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        feature: FooofArray.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: 'fooof'
      - id: 2
        node: fooof_scalars
        args:
          fooof_like: id.1
      - id: 3
        node: extract_data_var
        args:
          dataset_like: id.2
          data_var: 'fooof_aperiodic_exponent'
      - id: 4
        node: aggregate_across_dimension
        args:
          xarray_data: id.3
          dim: 'epochs'
          operation: 'mean'

  apSlopeSD:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        feature: FooofArray.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: 'fooof'
      - id: 2
        node: fooof_scalars
        args:
          fooof_like: id.1
      - id: 3
        node: extract_data_var
        args:
          dataset_like: id.2
          data_var: 'fooof_aperiodic_exponent'
      - id: 4
        node: aggregate_across_dimension
        args:
          xarray_data: id.3
          dim: 'epochs'
          operation: 'std'

  BandPower:
    overwrite: False
    for_dataframe: false
    nodes:
      - id: 0
        feature: SpectrumArrayMultitaper.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: 'spectrum'
      - id: 2
        node: bandpower
        args:
          psd_like: id.1
          bands:
            hfo: [70.0, 110.0]
            delta: [1.0, 4.0]
            theta: [4.0, 8.0]
            alpha: [8.0, 13.0]
            beta: [13.0, 30.0]
            preAlpha: [5.5, 8.0]
            slowTheta: [4.0, 5.5]

  BandPowerMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        feature: BandPower.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: 'epochs'
          operation: 'mean'

  BandPowerSD:
